name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'skills/*/prompt.md'
      - 'plugins/*/package.json'
      - 'plugins/*/src/**'

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Login to ClawHub
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}"

      - name: Detect changed skills and publish
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          PUBLISHED=""

          for dir in skills/*/; do
            dir_name=$(basename "$dir")
            [ ! -f "skills/$dir_name/SKILL.md" ] && continue

            if echo "$CHANGED_FILES" | grep -q "^skills/$dir_name/"; then
              echo ">>> Changes detected in skills/$dir_name, publishing..."

              VERSION=$(grep '^version:' "skills/$dir_name/SKILL.md" | head -1 | awk '{print $2}' | tr -d '"' | tr -d "'")
              NAME=$(grep '^name:' "skills/$dir_name/SKILL.md" | head -1 | awk '{print $2}' | tr -d '"' | tr -d "'")

              if [ -z "$VERSION" ]; then
                echo ">>> No version found in skills/$dir_name/SKILL.md, skipping"
                continue
              fi

              cd "skills/$dir_name"
              clawhub publish . \
                --slug "$NAME" \
                --name "$NAME" \
                --version "$VERSION" \
                --changelog "Auto-published from GitHub commit ${{ github.sha }}" \
                || echo ">>> Failed to publish $dir_name (version may already exist)"
              cd ../..

              PUBLISHED="$PUBLISHED $dir_name@$VERSION"
            fi
          done

          if [ -z "$PUBLISHED" ]; then
            echo ">>> No skill changes detected"
          else
            echo ">>> Published skills:$PUBLISHED"
          fi

  publish-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Login to ClawHub
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}"

      - name: Detect changed plugins and publish
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          PUBLISHED=""

          for dir in plugins/*/; do
            dir_name=$(basename "$dir")
            [ ! -f "plugins/$dir_name/package.json" ] && continue

            if echo "$CHANGED_FILES" | grep -q "^plugins/$dir_name/"; then
              echo ">>> Changes detected in plugins/$dir_name, publishing..."

              cd "plugins/$dir_name"
              npm install
              npm run build

              clawhub package publish . \
                --family code-plugin \
                --dry-run \
                && clawhub package publish . --family code-plugin \
                || echo ">>> Failed to publish plugin $dir_name"
              cd ../..

              PUBLISHED="$PUBLISHED $dir_name"
            fi
          done

          if [ -z "$PUBLISHED" ]; then
            echo ">>> No plugin changes detected"
          else
            echo ">>> Published plugins:$PUBLISHED"
          fi
